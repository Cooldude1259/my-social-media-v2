name: Build iOS SwiftUI App
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Compile and Package SwiftUI App
        run: |
          # 1. Recreate the clean iOS App Folder
          rm -rf MyApp.app Payload MyApp.ipa
          mkdir -p MyApp.app
          
          # 2. Compile ALL your SwiftUI files together using the native Apple iOS framework flags
          swiftc -target arm64-apple-ios15.0 \
                 -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
                 -Xfrontend -serialize-debugging-options \
                 Sources/AppEntry.swift Sources/ContentView.swift \
                 -o MyApp.app/MyApp
          
          # 3. Inject configuration details
          cp Info.plist MyApp.app/
          
          # 4. Pack the structural contents for AltStore
          mkdir Payload
          cp -r MyApp.app Payload/
          zip -r MyApp.ipa Payload

      - name: Upload App Asset
        uses: actions/upload-artifact@v4
        with:
          name: iPhoneApp
          path: MyApp.ipa
