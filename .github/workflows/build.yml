name: Build iOS SwiftUI App from Package

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Swift Toolchain
        uses: swift-actions/setup-swift@v2
        with:
          # Pulls the active developmental snapshot matching your tools requirement
          swift-version: "nightly-6.3"

      - name: Compile Swift Package for iOS Device
        run: |
          swift build \
            -c release \
            --triple arm64-apple-ios15.0 \
            --sdk $(xcrun --sdk iphoneos --show-sdk-path)

      - name: Construct Final Signed IPA Structure
        run: |
          mkdir -p Payload/MySocialMedia.app

          # Copies the binary compiled with the active 6.3 snapshot
          cp .build/arm64-apple-ios15.0/release/MySocialMedia Payload/MySocialMedia.app/MySocialMedia
          cp Info.plist Payload/MySocialMedia.app/Info.plist

          codesign --force --deep --sign - Payload/MySocialMedia.app
          zip -r MySocialMedia.ipa Payload

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: MySocialMedia.ipa
          tag_name: v1.0
          name: Release v1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
