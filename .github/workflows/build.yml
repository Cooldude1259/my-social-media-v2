name: Build iOS SwiftUI App from Package

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Swift Toolchain
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3"

      - name: Compile Swift Package for iOS Device
        run: |
          # 1. Compile directly with the explicit destination framework layout
          swift build \
            -c release \
            --triple arm64-apple-ios15.0 \
            --sdk $(xcrun --sdk iphoneos --show-sdk-path)

      - name: Construct Final Signed IPA Structure
        run: |
          # 2. Form the core installation directory structure
          mkdir -p Payload/MySocialMedia.app

          # 3. Extract the cleanly compiled binary file into the app layout
          cp .build/arm64-apple-ios15.0/release/MySocialMedia Payload/MySocialMedia.app/MySocialMedia

          # 4. Inject your customized universal device Info.plist layout 
          cp Info.plist Payload/MySocialMedia.app/Info.plist

          # 5. Ad-hoc code sign the bundle package to allow iPadOS execution
          codesign --force --deep --sign - Payload/MySocialMedia.app

          # 6. Compress into a deployable distribution asset file
          zip -r MySocialMedia.ipa Payload

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: MySocialMedia.ipa
          tag_name: v1.0
          name: Release v1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
