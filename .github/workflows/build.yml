name: Build iOS SwiftUI App

on:
  push:
    branches: [ main ]

# Grants permissions to create a GitHub Release and upload the .ipa installer file
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Compile, Sign, and Package SwiftUI App
        run: |
          # 1. Clean up old structures
          rm -rf MyApp.app Payload MyApp.ipa
          mkdir -p MyApp.app
          
          # 2. Compile your SwiftUI app files
          swiftc -target arm64-apple-ios15.0 \
                 -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
                 -Xfrontend -serialize-debugging-options \
                 Sources/AppEntry.swift Sources/ContentView.swift \
                 -o MyApp.app/MySocialMedia
          
          # 3. Inject configuration details
          cp Info.plist MyApp.app/
          
          # 4. THIS IS THE FIXED STEP: Forces an ad-hoc signature onto the binary so LiveContainer can map it
          codesign --force --deep --sign - MyApp.app/MySocialMedia
          
          # 5. Pack the structural contents into a Payload folder for AltStore/LiveContainer
          mkdir Payload
          cp -r MyApp.app Payload/
          zip -r MyApp.ipa Payload


      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: MyApp.ipa
          tag_name: v1.0
          name: Release v1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
