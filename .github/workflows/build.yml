name: Build iOS SwiftUI App

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Create Export Options Plist
        run: |
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://apple.com">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>compileBitcode</key>
              <false/>
              <key>thinning</key>
              <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

      - name: Archive and Export IPA
        run: |
          # 1. Clean and generate an official .xcarchive pack
          xcodebuild archive \
            -scheme MySocialMedia \
            -archivePath build/MySocialMedia.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

          # 2. Safely extract and format the official Payload environment
          mkdir -p Payload
          cp -r build/MySocialMedia.xcarchive/Products/Applications/*.app Payload/

          # 3. Apply the ad-hoc signature to the complete bundle structure
          codesign --force --deep --sign - Payload/*.app

          # 4. Compres into a deployment-ready installer file
          zip -r MyApp.ipa Payload

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: MyApp.ipa
          tag_name: v1.0
          name: Release v1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
