name: Build iOS SwiftUI App from Package

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Generate Xcode Project from Package
        run: |
          # 1. Force Swift Package Manager to map out an official .xcodeproj file
          swift package generate-xcodeproj

      - name: Build and Package App Bundle
        run: |
          # 2. Compile the newly generated Xcode project target for physical iOS hardware
          xcodebuild build \
            -project MySocialMedia.xcodeproj \
            -scheme MySocialMedia \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build_output \
            CODE_SIGNING_ALLOWED=NO

      - name: Construct Final Signed IPA Structure
        run: |
          # 3. Form the core installation directory structure
          mkdir -p Payload/MySocialMedia.app

          # 4. Extract the cleanly compiled binary file into the app layout
          BINARY_PATH=$(find build_output -name "MySocialMedia" -type f | grep -v "PackageProduct" | head -n 1)
          cp "$BINARY_PATH" Payload/MySocialMedia.app/MySocialMedia

          # 5. Inject your customized universal device Info.plist layout 
          cp Info.plist Payload/MySocialMedia.app/Info.plist

          # 6. Ad-hoc code sign the bundle package to allow iPadOS execution
          codesign --force --deep --sign - Payload/MySocialMedia.app

          # 7. Compress into a deployable distribution asset file
          zip -r MySocialMedia.ipa Payload

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: MySocialMedia.ipa
          tag_name: v1.0
          name: Release v1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
