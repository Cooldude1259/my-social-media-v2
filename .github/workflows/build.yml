name: Build iOS SwiftUI App from Package

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile Swift Package for iOS
        run: |
          # 1. Compile the executable using native Swift flags for iOS
          swift build \
            -c release \
            --triple arm64-apple-ios15.0 \
            --sdk $(xcrun --sdk iphoneos --show-sdk-path)

      - name: Construct Application Bundle
        run: |
          # 2. Build the precise directory path structure Apple requires
          mkdir -p Payload/MySocialMedia.app

          # 3. Locate and copy the release binary
          cp .build/arm64-apple-ios15.0/release/MySocialMedia Payload/MySocialMedia.app/MySocialMedia

          # 4. Inject your corrected Info.plist
          cp Info.plist Payload/MySocialMedia.app/Info.plist

      - name: Ad-Hoc Sign and Package IPA
        run: |
          # 5. Apply the ad-hoc signature to the complete bundle structure
          codesign --force --deep --sign - Payload/MySocialMedia.app

          # 6. Compress the Payload directory into a valid .ipa installer file
          zip -r MySocialMedia.ipa Payload

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: MySocialMedia.ipa
          tag_name: v1.0
          name: Release v1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
