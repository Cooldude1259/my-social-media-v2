name: Build iOS SwiftUI App from Package

on:
  push:
    branches: [ main ]

# Grants permissions to create a GitHub Release, upload the .ipa, and commit the updated apps.json
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compute Version Number
        id: version
        run: |
          # Auto-incrementing version. github.run_number goes up by 1 every workflow run,
          # so AltStore/LiveContainer always see a higher number and offer an update.
          VERSION="1.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "BUILD=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Compile Swift Package for iOS Device
        run: |
          swift build \
            -c release \
            --triple arm64-apple-ios15.0 \
            --sdk $(xcrun --sdk iphoneos --show-sdk-path)

      - name: Construct Final IPA Structure
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUILD="${{ steps.version.outputs.BUILD }}"

          # 1. Stamp this build's version into Info.plist (what AltStore compares against)
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" Info.plist

          # 2. Build the installation folder layout
          mkdir -p Payload/MySocialMedia.app

          # 3. Extract the cleanly compiled binary file from the standard release directory
          cp .build/release/MySocialMedia Payload/MySocialMedia.app/MySocialMedia

          # 4. Inject your universal iPadOS compatible Info.plist layout
          cp Info.plist Payload/MySocialMedia.app/Info.plist

          # 5. Generate home-screen app icons from icon.png (sips ships with macOS).
          #    iOS resolves "AppIcon60x60" to the @2x/@3x files at the matching scale.
          APP=Payload/MySocialMedia.app
          sips -z 120 120 icon.png --out "$APP/AppIcon60x60@2x.png"
          sips -z 180 180 icon.png --out "$APP/AppIcon60x60@3x.png"
          sips -z 152 152 icon.png --out "$APP/AppIcon76x76@2x.png"
          sips -z 167 167 icon.png --out "$APP/AppIcon83.5x83.5@2x.png"

          # 6. Intentionally NOT code-signing here.
          #    Sideloading tools (Install on Air, AltStore, Sideloadly) re-sign the
          #    bundle themselves with your own Apple ID cert at install time, and they
          #    expect a genuinely unsigned bundle as input. The previous step here used
          #    `codesign --sign -` (ad-hoc signing), which attaches a signature with no
          #    certificate chain behind it — that's what produced the
          #    "integrity could not be verified" error, since ad-hoc signatures don't
          #    satisfy a normal on-device install and can also interfere with the
          #    sideload tool's own re-signing pass.

          # 7. Compress into a deployable distribution asset file
          zip -r MySocialMedia.ipa Payload

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: MySocialMedia.ipa
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update AltStore Source (apps.json)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DATE=$(date +%Y-%m-%d)
          # AltStore requires the IPA size in bytes; recompute it for this build.
          SIZE=$(stat -f%z MySocialMedia.ipa)

          # Bump the version + date + size that AltStore compares against (flat AltStore schema).
          # downloadURL stays as ".../releases/latest/..." which auto-resolves to this release.
          jq --arg v "$VERSION" --arg d "$DATE" --argjson s "$SIZE" \
             '.apps[0].version = $v | .apps[0].versionDate = $d | .apps[0].size = $s' apps.json > apps.tmp.json
          mv apps.tmp.json apps.json

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          # "[skip ci]" stops this commit from triggering another build (no infinite loop)
          git commit -m "Release v$VERSION [skip ci]" || echo "No changes to commit"
          git push
