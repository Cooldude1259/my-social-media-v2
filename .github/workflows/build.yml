name: Build iOS SwiftUI App from Package

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile Swift Package for iOS Device
        run: |
          swift build \
            -c release \
            --triple arm64-apple-ios15.0 \
            --sdk $(xcrun --sdk iphoneos --show-sdk-path)

      - name: Construct Final Signed IPA Structure
        run: |
          # 1. Build the installation folder layout
          mkdir -p Payload/MySocialMedia.app

          # 2. Extract the cleanly compiled binary file from the standard release directory
          cp .build/release/MySocialMedia Payload/MySocialMedia.app/MySocialMedia
          
          # 3. Inject your universal iPadOS compatible Info.plist layout
          cp Info.plist Payload/MySocialMedia.app/Info.plist

          # 4. Ad-hoc code sign the bundle package to allow iPadOS execution
          codesign --force --deep --sign - Payload/MySocialMedia.app
          
          # 5. Compress into a deployable distribution asset file
          zip -r MySocialMedia.ipa Payload

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: MySocialMedia.ipa
          tag_name: v1.0
          name: Release v1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
