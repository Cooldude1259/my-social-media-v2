            - name: Swift - Build and Test
  # You may pin to the exact commit or the version.
  # uses: brightdigit/swift-build@4a7c5eca326125424d7de97901bb5af64c783296
  uses: brightdigit/swift-build@v1.5.6
  with:
    # Directory containing the Swift package
    working-directory: # optional, default is .
    # The scheme to build and test (auto-calculated from the Swift package when omitted on Apple platforms)
    scheme: # optional
    # Build type (ios, watchos, visionos, tvos, macos, android, wasm, wasm-embedded)
    type: # optional
    # Xcode version path for Apple platforms
    xcode: # optional
    # Simulator device name for Apple platforms
    deviceName: # optional
    # Simulator OS version for Apple platforms
    osVersion: # optional
    # Whether to download the platform if not available
    download-platform: # optional, default is false
    # Swift version for Windows Swift toolchain installation
    windows-swift-version: # optional
    # Swift build identifier for Windows Swift toolchain installation
    windows-swift-build: # optional
    # Swift version for Android Swift SDK installation
    android-swift-version: # optional
    # Android API level for emulator testing
    android-api-level: # optional
    # Android NDK version for Swift Android builds
    android-ndk-version: # optional
    # Run tests on Android emulator (must be false on ARM macOS)
    android-run-tests: # optional
    # Additional Swift build flags for Android builds
    android-swift-build-flags: # optional
    # Additional Swift test flags for Android tests
    android-swift-test-flags: # optional
    # Android emulator boot timeout in seconds
    android-emulator-boot-timeout: # optional
    # Additional files to copy to emulator for testing
    android-copy-files: # optional
    # Cache the Android AVD emulator snapshot (skiptools/swift-android-action). Set to false to save Actions storage. Default: true
    cache-avd: # optional, default is true
    # Additional Swift compiler/linker flags for Wasm builds
    wasm-swift-flags: # optional
    # Optional: Use Wasmtime runtime fallback (specify specific version like "27.0.0"). Default: Uses WasmKit runtime (bundled with Swift 6.2.3+). Note: "latest" is no longer supported.
    wasmtime-version: # optional, default is 
    # Testing library detection mode for Wasm tests (auto, swift-testing, xctest, both, none). Default: auto (automatically detect)
    wasm-testing-library: # optional, default is auto
    # Additional flags passed to Wasm test runner (WasmKit/Wasmtime). Example: --parallel
    wasm-swift-test-flags: # optional, default is 
    # Enable xcbeautify for prettified xcodebuild output (Apple platforms only)
    use-xcbeautify: # optional, default is false
    # xcbeautify renderer for CI integration (default, github-actions, teamcity, azure-devops-pipelines)
    xcbeautify-renderer: # optional, default is default
    # xcbeautify version to install (e.g., 2.30.1, 2.29.0)
    xcbeautify-version: # optional, default is 2.30.1
    # Skip Package.resolved dependency pinning (allows floating dependency versions)
    skip-package-resolved: # optional, default is false
    # Build without running tests
    build-only: # optional, default is false
    # Save test output to runner temp directory for artifact upload. Useful for test validation workflows.
    save-test-output: # optional, default is false
          
